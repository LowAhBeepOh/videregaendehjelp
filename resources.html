<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Videregående Hjelp - Ressurser. PDF-er, datasett og nyttige dokumenter for elever.">
  <title>Ressurser – Videregående Hjelp</title>
  <link rel="shortcut icon" href="vgshjelp-logo.png" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <style>
    :root {
      --bg: #050505;
      --text: #ffffff;
      --text-muted: #888;

      --card-red: #d40b00;
      --card-lime: #D0F54E;
      --card-blue: #5865F2;
      --card-orange: #FF9F0A;
      --card-green: #30D158;
      --card-pale: #F2F2F7;
      --card-purple: #9B5DE5;
      --card-teal: #00C9A7;

      --surface: #1c1c1e;
      --border: #2c2c2e;

      --font-display: 'Inter Tight', sans-serif;
      --font-body: 'Manrope', sans-serif;
    }

    [data-theme="light"] {
      --bg: #ffffff;
      --text: #000000;
      --text-muted: #555;
      --surface: #f2f2f7;
      --border: #e5e5ea;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.4;
      min-height: 100vh;
      overflow-x: hidden;
    }

    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 16px 40px 16px;
    }

    @media (min-width: 480px) {
      main { padding: 0 20px 60px 20px; }
    }

    /* Header */
    header {
      padding: 12px 0;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }

    @media (min-width: 480px) {
      header { padding: 20px 0; margin-bottom: 40px; }
    }

    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
    }

    @media (min-width: 480px) {
      .header-content { padding: 0 20px; }
    }

    .logo {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.03em;
    }

    @media (min-width: 480px) {
      .logo { font-size: 24px; }
    }

    .nav-links {
      display: flex;
      gap: 12px;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 13px;
      transition: color 0.2s;
    }

    .nav-links a:hover { color: var(--text); }
    .nav-links a.active { color: var(--text); }

    @media (min-width: 480px) {
      .nav-links { gap: 24px; }
      .nav-links a { font-size: 15px; }
    }

    /* Page header */
    .page-header {
      margin-bottom: 32px;
    }

    .page-title {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      margin-bottom: 8px;
    }

    @media (min-width: 480px) {
      .page-title { font-size: 52px; }
      .page-header { margin-bottom: 40px; }
    }

    @media (min-width: 768px) {
      .page-title { font-size: 64px; }
    }

    .page-subtitle {
      font-size: 14px;
      color: var(--text-muted);
      font-weight: 500;
    }

    @media (min-width: 480px) {
      .page-subtitle { font-size: 16px; }
    }

    /* Filter tabs */
    .filter-tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    @media (min-width: 480px) {
      .filter-tabs { margin-bottom: 36px; gap: 10px; }
    }

    .filter-tab {
      padding: 8px 16px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: var(--font-display);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-tab:hover {
      border-color: var(--text-muted);
      color: var(--text);
    }

    .filter-tab.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    @media (min-width: 480px) {
      .filter-tab { font-size: 14px; padding: 9px 18px; }
    }

    /* Resource grid */
    .resource-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    @media (min-width: 640px) {
      .resource-grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
    }

    @media (min-width: 1024px) {
      .resource-grid { grid-template-columns: repeat(3, 1fr); gap: 16px; }
    }

    /* Resource card */
    .resource-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      text-decoration: none;
      color: var(--text);
      transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1), box-shadow 0.2s, border-color 0.2s;
      position: relative;
      overflow: hidden;
    }

    .resource-card:hover {
      transform: scale(1.02);
      box-shadow: 0 20px 40px rgba(0,0,0,0.35);
      border-color: rgba(255,255,255,0.15);
    }

    @media (min-width: 480px) {
      .resource-card { padding: 24px; gap: 14px; }
    }

    .resource-thumbnail {
      width: 100%;
      height: 160px;
      border-radius: 4px;
      object-fit: cover;
      margin-bottom: 8px;
    }

    @media (min-width: 480px) {
      .resource-thumbnail { height: 180px; }
    }

    .resource-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }

    .resource-type-badge {
      font-family: var(--font-display);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 100px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .badge-pdf {
      background: rgba(212, 11, 0, 0.15);
      color: #ff6b63;
    }

    .badge-data {
      background: rgba(88, 101, 242, 0.15);
      color: #a0a8ff;
    }

    .badge-ekstern {
      background: rgba(208, 245, 78, 0.12);
      color: #b8dd2c;
    }

    .badge-dokument {
      background: rgba(255, 159, 10, 0.15);
      color: #ffb84d;
    }

    [data-theme="light"] .badge-pdf { background: rgba(212, 11, 0, 0.1); color: #b00900; }
    [data-theme="light"] .badge-data { background: rgba(88, 101, 242, 0.1); color: #3b4dd4; }
    [data-theme="light"] .badge-ekstern { background: rgba(100, 120, 0, 0.1); color: #556600; }
    [data-theme="light"] .badge-dokument { background: rgba(255, 159, 10, 0.1); color: #b56d00; }

    .resource-file-icon {
      width: 40px;
      height: 40px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .resource-file-icon .material-icons {
      font-size: 22px;
    }

    .icon-pdf { background: rgba(212, 11, 0, 0.15); color: #ff6b63; }
    .icon-data { background: rgba(88, 101, 242, 0.15); color: #a0a8ff; }
    .icon-ekstern { background: rgba(208, 245, 78, 0.12); color: #b8dd2c; }
    .icon-dokument { background: rgba(255, 159, 10, 0.15); color: #ffb84d; }

    [data-theme="light"] .icon-pdf { background: rgba(212, 11, 0, 0.1); color: #b00900; }
    [data-theme="light"] .icon-data { background: rgba(88, 101, 242, 0.1); color: #3b4dd4; }
    [data-theme="light"] .icon-ekstern { background: rgba(100, 120, 0, 0.1); color: #556600; }
    [data-theme="light"] .icon-dokument { background: rgba(255, 159, 10, 0.1); color: #b56d00; }

    .resource-title {
      font-family: var(--font-display);
      font-size: 17px;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.2;
    }

    @media (min-width: 480px) {
      .resource-title { font-size: 19px; }
    }

    .resource-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
      flex: 1;
    }

    @media (min-width: 480px) {
      .resource-desc { font-size: 14px; }
    }

    .resource-card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 12px;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }

    .resource-meta {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--font-display);
      font-weight: 600;
    }

    @media (min-width: 480px) {
      .resource-meta { font-size: 12px; }
    }

    .resource-action {
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: var(--font-display);
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      transition: color 0.15s;
    }

    .resource-card:hover .resource-action {
      color: var(--text);
    }

    .resource-action .material-icons {
      font-size: 16px;
    }

    /* Featured card */
    .resource-card.featured {
      grid-column: 1 / -1;
      background: var(--card-lime);
      color: #000;
      border-color: transparent;
      flex-direction: row;
      align-items: center;
      gap: 24px;
      padding: 28px;
    }

    .resource-card.featured:hover {
      border-color: transparent;
    }

    .featured-content {
      flex: 1;
    }

    .featured-label {
      font-size: 12px;
      font-weight: 700;
      opacity: 0.6;
      margin-bottom: 6px;
      font-family: var(--font-display);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .featured-title {
      font-family: 'Instrument Serif', serif;
      font-size: 28px;
      font-weight: 400;
      font-style: italic;
      letter-spacing: -0.03em;
      line-height: 1;
      color: #000;
    }

    @media (min-width: 480px) {
      .featured-title { font-size: 38px; }
    }

    @media (min-width: 768px) {
      .featured-title { font-size: 48px; }
    }

    .featured-desc {
      font-size: 14px;
      color: rgba(0,0,0,0.6);
      margin-top: 8px;
      max-width: 560px;
    }

    .featured-cta {
      flex-shrink: 0;
      background: #000;
      color: #fff;
      border: none;
      padding: 14px 22px;
      border-radius: 100px;
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: transform 0.15s, opacity 0.15s;
    }

    .featured-cta:hover { transform: scale(1.04); opacity: 0.88; }

    @media (max-width: 639px) {
      .resource-card.featured {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    /* Empty state */
    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }

    .empty-state .material-icons {
      font-size: 48px;
      opacity: 0.3;
      display: block;
      margin-bottom: 12px;
    }

    .empty-state p {
      font-size: 15px;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      gap: 24px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-value {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.04em;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    @media (min-width: 480px) {
      .stat-value { font-size: 28px; }
    }

    /* Footer */
    footer {
      margin-top: 40px;
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="header-content">
        <a href="index.html" class="logo">Videregående Hjelp</a>
        <nav class="nav-links">
          <a href="guides.html">Guider</a>
          <a href="tools.html">Verktøy</a>
          <a href="ressurser.html" class="active">Ressurser</a>
        </nav>
      </div>
    </header>

    <div class="page-header">
      <h1 class="page-title">Ressurser</h1>
      <p class="page-subtitle">PDF-er, datasett, dokumenter og nyttige lenker for elever</p>
    </div>

    <div class="filter-tabs" id="filterTabs">
      <button class="filter-tab active" data-filter="alle">Alle</button>
      <button class="filter-tab" data-filter="pdf">PDF</button>
      <button class="filter-tab" data-filter="data">Data</button>
      <button class="filter-tab" data-filter="dokument">Dokument</button>
      <button class="filter-tab" data-filter="ekstern">Ekstern lenke</button>
    </div>

    <div class="resource-grid" id="resourceGrid">
      <!-- Populated by JS -->
    </div>
  </main>

  <script>
    const resources = [
      {
        title: 'Mattesett',
        desc: 'Et regneark med kalkulatorer for matematikk',
        type: 'data',
        url: 'https://docs.google.com/spreadsheets/d/1mbJ_Bu6cKbzZH_C79JtD9lM2PLXPUrJaCA78bCRMc-0/edit?usp=sharing',
        icon: 'table_chart',
        meta: 'Google Regneark',
        action: 'Åpne',
        actionIcon: 'open_in_new',
        thumbnail: 'Assets/Thumbnails/mattesett_thumb.png'
      },
      {
        title: 'Hva sensor ser etter',
        desc: 'Et kort dokument som forklarer vurderingskriterier og hva som kjennetegner gode besvarelser.',
        type: 'dokument',
        url: 'https://docs.google.com/document/d/1PRPltPVveNC9cMQhppMaeO0FSF6VuELzbgGkO-SAgxY/edit?usp=sharing',
        icon: 'description',
        meta: 'Google Dokument',
        action: 'Åpne',
        actionIcon: 'open_in_new',
        thumbnail: 'Assets/Thumbnails/generic_docs_thumb.png'
      }
    ];

    const typeConfig = {
      pdf:      { badgeClass: 'badge-pdf',      iconClass: 'icon-pdf',      label: 'PDF' },
      data:     { badgeClass: 'badge-data',     iconClass: 'icon-data',     label: 'Data' },
      ekstern:  { badgeClass: 'badge-ekstern',  iconClass: 'icon-ekstern',  label: 'Ekstern lenke' },
      dokument: { badgeClass: 'badge-dokument', iconClass: 'icon-dokument', label: 'Dokument' }
    };

    let activeFilter = 'alle';

    function renderGrid(filter) {
      const grid = document.getElementById('resourceGrid');
      const filtered = filter === 'alle' ? resources : resources.filter(r => r.type === filter);

      if (filtered.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <span class="material-icons">folder_open</span>
            <p>Ingen ressurser i denne kategorien enda.</p>
          </div>
        `;
        return;
      }

      grid.innerHTML = filtered.map(r => {
        const cfg = typeConfig[r.type] || typeConfig.dokument;
        const thumbnailHtml = r.thumbnail ? `<img src="${r.thumbnail}" alt="${r.title}" class="resource-thumbnail">` : '';
        return `
          <a href="${r.url}" class="resource-card" ${r.url.startsWith('http') ? 'target="_blank" rel="noopener"' : ''}>
            ${thumbnailHtml}
            <div>
              <div class="resource-title">${r.title}</div>
              <div class="resource-desc">${r.desc}</div>
            </div>
            <div class="resource-card-footer">
              <span class="resource-meta">${r.meta}</span>
              <span class="resource-action">
                ${r.action}
                <span class="material-icons">${r.actionIcon}</span>
              </span>
            </div>
          </a>
        `;
      }).join('');
    }

    document.getElementById('filterTabs').addEventListener('click', e => {
      const btn = e.target.closest('.filter-tab');
      if (!btn) return;
      document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
      renderGrid(activeFilter);
    });

    // Theme init matching index.html
    if (!localStorage.getItem('theme')) {
      localStorage.setItem('theme', 'dark');
    }
    document.documentElement.setAttribute('data-theme', localStorage.getItem('theme'));

    renderGrid('alle');
  </script>
</body>
</html>
