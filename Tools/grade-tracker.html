<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Karaktertrakker – Videregående Hjelp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0d2340; --navy-mid: #1a3a5c; --accent: #3b7dd8;
    --bg: #f2f5f9; --surface: #ffffff; --surface2: #eef2f8;
    --text: #0d2340; --text-muted: #5a7399; --border: #d4dff0;
    --green: #1a9e5c; --orange: #e07b2a; --red: #d63b3b;
    --radius: 16px; --shadow: 0 4px 24px rgba(13,35,64,0.10);
  }
  body { font-family: 'Inter Tight', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; }
  header { background: var(--navy); padding: 22px 40px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; border-bottom: 4px solid var(--accent); }
  header h1 { color: #fff; font-size: 20px; font-weight: 700; letter-spacing: -0.02em; margin-right: auto; }
  .back-link { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
  .back-link:hover { color: #fff; }
  
  .container { max-width: 900px; margin: 0 auto; padding: 40px 20px 100px; display: grid; grid-template-columns: 1fr 300px; gap: 24px; }
  @media (max-width: 850px) { .container { grid-template-columns: 1fr; } }
  
  .main-content { display: flex; flex-direction: column; gap: 24px; }

  .summary-panel { background: var(--navy); color: #fff; padding: 32px; border-radius: var(--radius); position: sticky; top: 40px; height: fit-content; box-shadow: var(--shadow); border-bottom: 6px solid var(--accent); }
  .summary-label { font-size: 13px; font-weight: 700; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .summary-value { font-size: 64px; font-weight: 900; letter-spacing: -0.04em; line-height: 1; margin-bottom: 12px; color: var(--accent); }
  .summary-stats { display: flex; flex-direction: column; gap: 12px; border-top: 1px solid rgba(255,255,255,0.1); pt: 20px; margin-top: 20px; padding-top: 20px; }
  .stat-item { display: flex; justify-content: space-between; font-size: 14px; font-weight: 600; }
  .stat-item span:last-child { color: var(--accent); }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 32px; box-shadow: var(--shadow); }
  .card-header { margin-bottom: 24px; }
  .card-title { font-size: 24px; font-weight: 800; letter-spacing: -0.03em; color: var(--navy); }
  .card-sub { font-size: 14px; color: var(--text-muted); margin-top: 4px; }

  .subject-list { display: flex; flex-direction: column; gap: 10px; }
  .subject-item { display: flex; align-items: center; gap: 12px; background: var(--surface2); padding: 14px 18px; border-radius: 12px; border: 1.5px solid transparent; transition: all 0.2s; }
  .subject-item:hover { border-color: var(--accent); background: #fff; transform: translateX(4px); }
  
  .subject-name-input { flex: 1; border: none; background: transparent; font-family: 'Inter Tight', sans-serif; font-size: 15px; font-weight: 700; color: var(--navy); padding: 8px 0; }
  .subject-name-input:focus { outline: none; }
  .subject-name-input::placeholder { color: var(--text-muted); opacity: 0.4; }

  .grade-select { width: 70px; padding: 10px; border: 2px solid var(--border); border-radius: 10px; font-family: 'Inter Tight', sans-serif; font-size: 16px; font-weight: 800; text-align: center; background: var(--surface); color: var(--navy); cursor: pointer; appearance: none; transition: all 0.2s; }
  .grade-select:focus { outline: none; border-color: var(--accent); background: var(--surface2); }
  .grade-select option { font-weight: 700; }

  .btn-remove { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 10px; border-radius: 10px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .btn-remove:hover { background: #fee; color: var(--red); }

  .btn-add { width: 100%; padding: 18px; background: var(--surface2); border: 2px dashed var(--border); border-radius: 12px; color: var(--navy-mid); font-family: 'Inter Tight', sans-serif; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; margin-top: 16px; display: flex; align-items: center; justify-content: center; gap: 10px; }
  .btn-add:hover { border-color: var(--accent); color: var(--accent); background: #fff; }

  .footer-actions { display: flex; justify-content: space-between; align-items: center; margin-top: 32px; padding-top: 24px; border-top: 1px solid var(--border); }
  .btn { padding: 12px 24px; border-radius: 10px; font-family: 'Inter Tight', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; border: none; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
  .btn-danger { background: transparent; color: var(--text-muted); }
  .btn-danger:hover { color: var(--red); background: #fee; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: var(--navy); transform: translateY(-2px); }

  /* Grade colors */
  .grade-6 { color: var(--green) !important; }
  .grade-5 { color: #2ecc71 !important; }
  .grade-4 { color: var(--orange) !important; }
  .grade-3 { color: #f39c12 !important; }
  .grade-2 { color: #e67e22 !important; }
  .grade-1 { color: var(--red) !important; }
</style>
</head>
<body>

<header>
  <h1>Karaktertrakker</h1>
  <a href="../tools.html" class="back-link"><span class="material-icons">arrow_back</span> Tilbake</a>
</header>

<div class="container">
  
  <div class="main-content">
    <div class="card">
      <div class="card-header">
        <div class="card-title">Dine fag</div>
        <div class="card-sub">Legg til dine fag og karakterer for å se snittet ditt.</div>
      </div>
      
      <div class="subject-list" id="subjectList">
        <!-- Items will be added here -->
      </div>

      <button class="btn-add" onclick="addSubject()">
        <span class="material-icons">add_circle</span> Legg til nytt fag
      </button>

      <div class="footer-actions">
        <button class="btn btn-danger" onclick="clearAll()">
          <span class="material-icons">delete_sweep</span> Nullstill alt
        </button>
        <button class="btn btn-primary" onclick="window.print()">
          <span class="material-icons">print</span> Skriv ut vitnemål
        </button>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <div class="summary-panel">
      <div class="summary-label">Gjennomsnitt</div>
      <div class="summary-value" id="averageDisplay">0.0</div>
      
      <div class="summary-stats">
        <div class="stat-item">
          <span>Antall fag</span>
          <span id="subjectCount">0</span>
        </div>
        <div class="stat-item">
          <span>Skolepoeng</span>
          <span id="schoolPoints">0.0</span>
        </div>
        <div class="stat-item">
          <span>Status</span>
          <span id="statusText">Ingen fag</span>
        </div>
      </div>
    </div>
  </div>

</div>

<script>
  let subjects = [];

  function init() {
    const saved = localStorage.getItem('gradeTrackerData');
    if (saved) {
      subjects = JSON.parse(saved);
    } else {
      subjects = [
        { id: 1, name: 'Norsk hovedmål', grade: '' },
        { id: 2, name: 'Norsk sidemål', icon: 'edit' },
        { id: 3, name: 'Engelsk', grade: '' },
        { id: 4, name: 'Matematikk', grade: '' },
        { id: 5, name: 'Naturfag', grade: '' },
        { id: 6, name: 'Samfunnsfag', grade: '' },
        { id: 7, name: 'Kroppsøving', grade: '' }
      ];
    }
    render();
  }

  function save() {
    localStorage.setItem('gradeTrackerData', JSON.stringify(subjects));
    calculateAverage();
  }

  function addSubject() {
    subjects.push({
      id: Date.now(),
      name: '',
      grade: ''
    });
    render();
    save();
  }

  function removeSubject(id) {
    subjects = subjects.filter(s => s.id !== id);
    render();
    save();
  }

  function updateSubject(id, field, value) {
    const subject = subjects.find(s => s.id === id);
    if (subject) {
      subject[field] = value;
      save();
      if (field === 'grade') render(); // Re-render to update colors
    }
  }

  function calculateAverage() {
    let sum = 0;
    let count = 0;
    
    subjects.forEach(s => {
      const g = parseInt(s.grade);
      if (!isNaN(g) && g >= 1 && g <= 6) {
        sum += g;
        count++;
      }
    });

    const avg = count > 0 ? (sum / count) : 0;
    const avgFormatted = avg.toFixed(2);
    
    document.getElementById('averageDisplay').textContent = avg === 0 ? '0.0' : avgFormatted;
    document.getElementById('subjectCount').textContent = count;
    document.getElementById('schoolPoints').textContent = (avg * 10).toFixed(1);

    const status = document.getElementById('statusText');
    if (count === 0) status.textContent = "Ingen fag";
    else if (avg >= 5.5) status.textContent = "Eksepsjonelt! 🏆";
    else if (avg >= 5.0) status.textContent = "Veldig bra! 🌟";
    else if (avg >= 4.0) status.textContent = "Godt jobba! 👍";
    else status.textContent = "Stå på! 💪";
  }

  function render() {
    const list = document.getElementById('subjectList');
    list.innerHTML = '';

    subjects.forEach(s => {
      const item = document.createElement('div');
      item.className = 'subject-item';
      
      let gradeClass = '';
      if (s.grade) gradeClass = 'grade-' + s.grade;

      item.innerHTML = `
        <input type="text" class="subject-name-input" placeholder="Navn på fag..." value="${s.name}" oninput="updateSubject(${s.id}, 'name', this.value)">
        <select class="grade-select ${gradeClass}" onchange="updateSubject(${s.id}, 'grade', this.value)">
          <option value="" ${s.grade === '' ? 'selected' : ''}>-</option>
          <option value="6" class="grade-6" ${s.grade === '6' ? 'selected' : ''}>6</option>
          <option value="5" class="grade-5" ${s.grade === '5' ? 'selected' : ''}>5</option>
          <option value="4" class="grade-4" ${s.grade === '4' ? 'selected' : ''}>4</option>
          <option value="3" class="grade-3" ${s.grade === '3' ? 'selected' : ''}>3</option>
          <option value="2" class="grade-2" ${s.grade === '2' ? 'selected' : ''}>2</option>
          <option value="1" class="grade-1" ${s.grade === '1' ? 'selected' : ''}>1</option>
        </select>
        <button class="btn-remove" onclick="removeSubject(${s.id})" title="Fjern fag">
          <span class="material-icons">close</span>
        </button>
      `;
      list.appendChild(item);
    });

    calculateAverage();
  }

  function clearAll() {
    if (confirm('Er du sikker på at du vil slette alt? Dette kan ikke angres.')) {
      subjects = [];
      save();
      render();
    }
  }

  init();
</script>
</body>
</html>
