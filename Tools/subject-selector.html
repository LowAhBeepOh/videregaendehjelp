<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fagvelger – Videregående Hjelp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0d2340; --navy-mid: #1a3a5c; --accent: #3b7dd8;
    --bg: #f2f5f9; --surface: #ffffff; --surface2: #eef2f8;
    --text: #0d2340; --text-muted: #5a7399; --border: #d4dff0;
    --radius: 14px; --shadow: 0 4px 24px rgba(13,35,64,0.10);
  }
  body { font-family: 'Inter Tight', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; line-height: 1.5; }
  header { background: var(--navy); padding: 22px 40px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
  header h1 { color: #fff; font-size: 20px; font-weight: 700; letter-spacing: -0.02em; margin-right: auto; }
  .back-link { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
  .back-link:hover { color: #fff; }
  
  .container { max-width: 800px; margin: 0 auto; padding: 36px 20px 80px; }
  
  .quiz-card { background: var(--surface); border-radius: var(--radius); padding: 40px; box-shadow: var(--shadow); text-align: center; min-height: 400px; display: flex; flex-direction: column; justify-content: center; }
  .progress-bar { width: 100%; height: 6px; background: var(--surface2); border-radius: 3px; margin-bottom: 30px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s ease; }

  .question { font-size: 26px; font-weight: 800; margin-bottom: 30px; letter-spacing: -0.02em; color: var(--navy); }
  
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 30px; }
  @media (max-width: 600px) { .options { grid-template-columns: 1fr; } }

  .option-btn { padding: 24px; border: 2px solid var(--border); border-radius: 12px; background: var(--surface); color: var(--text); font-family: 'Inter Tight', sans-serif; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .option-btn .material-icons { font-size: 32px; color: var(--accent); }
  .option-btn:hover { border-color: var(--accent); background: var(--surface2); transform: translateY(-2px); }

  .result-area { display: none; text-align: left; }
  .result-title { font-size: 24px; font-weight: 800; color: var(--navy); margin-bottom: 8px; text-align: center; }
  .result-desc { color: var(--text-muted); font-size: 16px; margin-bottom: 30px; text-align: center; }
  
  .program-list { display: flex; flex-direction: column; gap: 20px; }
  .program-card { background: var(--surface2); padding: 24px; border-radius: 12px; border-left: 5px solid var(--accent); }
  .program-name { font-weight: 800; font-size: 18px; color: var(--navy); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
  .program-reason { font-size: 14px; color: var(--text-muted); line-height: 1.6; background: #fff; padding: 12px; border-radius: 8px; margin-top: 10px; border: 1px solid var(--border); }
  .program-reason strong { color: var(--navy); }

  .restart-btn { margin: 40px auto 0; padding: 14px 28px; background: var(--navy); color: #fff; border: none; border-radius: 10px; cursor: pointer; font-family: 'Inter Tight', sans-serif; font-weight: 700; display: block; }
  .restart-btn:hover { background: var(--accent); transform: scale(1.02); }
</style>
</head>
<body>

<header>
  <h1>Fagvelger</h1>
  <a href="../tools.html" class="back-link"><span class="material-icons">arrow_back</span> Tilbake</a>
</header>

<div class="container">
  
  <div class="quiz-card" id="quizCard">
    <div class="progress-bar" id="progressBarContainer">
      <div class="progress-fill" id="progressFill" style="width: 0%"></div>
    </div>
    <div id="quizContent">
      <div class="question" id="questionText">Laster...</div>
      <div class="options" id="optionsArea"></div>
    </div>
    
    <div class="result-area" id="resultArea">
      <div class="result-title">Dine anbefalinger</div>
      <div class="result-desc">Basert på dine svar har vi funnet utdanningsprogram som kan passe deg perfekt.</div>
      <div class="program-list" id="programList"></div>
      <button class="restart-btn" onclick="restart()">Ta testen på nytt</button>
    </div>
  </div>

</div>

<script>
  const questions = [
    {
      id: 1,
      text: "Hvilken arbeidsform trives du best med?",
      options: [
        { text: "Lese, analysere og skrive", icon: "menu_book", value: "teori" },
        { text: "Skape, bygge og reparere", icon: "construction", value: "praksis" }
      ]
    },
    {
      id: 2,
      text: "Hva interesserer deg mest på fritiden?",
      options: [
        { text: "Teknologi, gaming eller koding", icon: "computer", value: "tech" },
        { text: "Være kreativ (tegne, musikk, foto)", icon: "palette", value: "creative" },
        { text: "Trening, sport og friluftsliv", icon: "fitness_center", value: "physical" },
        { text: "Være sosial og hjelpe andre", icon: "groups", value: "social" }
      ]
    },
    {
      id: 3,
      text: "Hvor lenge ser du for deg å gå på skole?",
      options: [
        { text: "Vil raskt ut i jobb (2-4 år)", icon: "work", value: "fast" },
        { text: "Vil studere lenge (5-6+ år)", icon: "school", value: "long" }
      ]
    },
    {
      id: 4,
      text: "Hvilket miljø foretrekker du å jobbe i?",
      options: [
        { text: "Kontor eller klasserom", icon: "business", value: "office" },
        { text: "Verksted, sykehus eller ute", icon: "home_repair_service", value: "field" }
      ]
    }
  ];

  let currentStep = 0;
  let answers = {};

  function init() {
    showQuestion(0);
  }

  function showQuestion(index) {
    const q = questions[index];
    document.getElementById('questionText').textContent = q.text;
    const opts = document.getElementById('optionsArea');
    opts.innerHTML = '';
    
    // Update progress
    const progress = (index / questions.length) * 100;
    document.getElementById('progressFill').style.width = progress + '%';

    q.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.innerHTML = `<span class="material-icons">${opt.icon}</span> ${opt.text}`;
      btn.onclick = () => selectOption(opt.value);
      opts.appendChild(btn);
    });
  }

  function selectOption(val) {
    answers[currentStep] = val;
    currentStep++;
    
    if (currentStep < questions.length) {
      showQuestion(currentStep);
    } else {
      showResult();
    }
  }

  function showResult() {
    document.getElementById('progressFill').style.width = '100%';
    setTimeout(() => {
      document.getElementById('quizContent').style.display = 'none';
      document.getElementById('progressBarContainer').style.display = 'none';
      document.getElementById('resultArea').style.display = 'block';

      const recs = calculateResults();
      const list = document.getElementById('programList');
      list.innerHTML = '';
      
      recs.forEach(r => {
        list.innerHTML += `
          <div class="program-card">
            <div class="program-name"><span class="material-icons" style="color:var(--accent)">verified</span>${r.name}</div>
            <div class="program-reason"><strong>Hvorfor dette passer deg:</strong><br>${r.reason}</div>
          </div>
        `;
      });
    }, 300);
  }

  function calculateResults() {
    const { 0: workType, 1: interest, 2: duration, 3: environment } = answers;
    let recs = [];

    // Logic for recommendations with detailed reasoning
    if (workType === 'teori' && duration === 'long') {
      if (interest === 'tech') {
        recs.push({
          name: "Studiespesialisering (Realfag)",
          reason: "Du trives med teori og ønsker lang utdanning. Realfag gir deg det beste grunnlaget for å studere informatikk, ingeniørfag eller andre teknologiske retninger på universitetet."
        });
      } else if (interest === 'social') {
        recs.push({
          name: "Studiespesialisering (Språk, samfunnsfag og økonomi)",
          reason: "Siden du liker å jobbe med mennesker og foretrekker teoretisk arbeid, vil dette programmet gi deg tilgang til studier som psykologi, juss eller sosiologi."
        });
      } else if (interest === 'creative') {
        recs.push({
          name: "Kunst, design og arkitektur",
          reason: "Dette er et studieforberedende løp for deg som vil ha generell studiekompetanse, men samtidig bruke dine kreative evner i en teoretisk ramme."
        });
      } else if (interest === 'physical') {
        recs.push({
          name: "Idrettsfag",
          reason: "Du får studiekompetanse samtidig som du får trene i skoletiden. Perfekt for deg som vil studere videre, men er glad i fysisk aktivitet."
        });
      }
    } else if (workType === 'praksis') {
      if (interest === 'tech') {
        recs.push({
          name: "Elektro og datateknologi",
          reason: "Du liker teknologi og praktisk arbeid. Her får du jobbe med hendene i et teknisk miljø, og du kan gå rett ut i lære etter to år."
        });
        recs.push({
          name: "Informasjonsteknologi og medieproduksjon",
          reason: "En mer praktisk vei inn i IT-verdenen enn studiespesialisering. Passer perfekt hvis du vil jobbe med drift, nettverk eller innholdsproduksjon."
        });
      } else if (interest === 'social') {
        recs.push({
          name: "Helse- og oppvekstfag",
          reason: "Siden du vil hjelpe andre og foretrekker praktisk arbeid fremfor bare bøker, er dette veien til yrker som helsefagarbeider eller barne- og ungdomsarbeider."
        });
      } else if (interest === 'physical') {
        recs.push({
          name: "Bygg- og anleggsteknikk",
          reason: "Du foretrekker å jobbe ute eller på feltet og liker fysisk arbeid. Her får du bygge ting som varer, og det er stor etterspørsel etter fagarbeidere."
        });
      } else if (interest === 'creative') {
        recs.push({
          name: "Frisør, blomster, interiør og eksponeringsdesign",
          reason: "Dette programmet lar deg bruke dine kreative evner praktisk hver eneste dag. Perfekt for deg som vil skape noe med hendene."
        });
      }
    }

    // Fallback if no specific match
    if (recs.length === 0) {
      recs.push({
        name: "Studiespesialisering",
        reason: "Siden dine svar er varierte, er Studiespesialisering det tryggeste valget. Det gir deg tre år på å finne ut hva du vil, og holder alle dører åpne for videre studier."
      });
    }

    return recs;
  }

  function restart() {
    currentStep = 0;
    answers = {};
    document.getElementById('quizContent').style.display = 'block';
    document.getElementById('progressBarContainer').style.display = 'block';
    document.getElementById('resultArea').style.display = 'none';
    init();
  }

  init();
</script>
</body>
</html>
