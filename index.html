  <style>
    :root {
      /* Bold Palette */
      --bg: #050505; 
      --text: #ffffff;
      --text-muted: #888;
      
      --card-red: #d40b00; /* Interactives */
      --card-lime: #D0F54E; /* Guides */
      --card-blue: #5865F2; /* Discord Blurple */
      --card-orange: #FF9F0A; /* Tools */
      --card-green: #30D158;
      --card-pale: #F2F2F7;
      
      --surface: #1c1c1e;
      --border: #2c2c2e;
      
      /* Typography */
      --font-display: 'Inter Tight', sans-serif;
      --font-body: 'Manrope', sans-serif;
    }

    [data-theme="light"] {
      --bg: #ffffff;
      --text: #000000;
      --text-muted: #555;
      --surface: #f2f2f7;
      --border: #e5e5ea;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.4;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Layout */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 16px 40px 16px;
    }

    /* Header */
    header {
      padding: 12px 0;
      margin-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    
    @media (min-width: 480px) {
      main {
        padding: 0 20px 60px 20px;
      }
      
      header {
        padding: 20px 0;
        margin-bottom: 40px;
      }
    }

    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
    }
    
    @media (min-width: 480px) {
      .header-content {
        padding: 0 20px;
      }
    }

    .logo {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.03em;
    }

    .nav-links {
      display: flex;
      gap: 12px;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 13px;
      transition: color 0.2s;
    }
    
    @media (min-width: 480px) {
      .logo {
        font-size: 24px;
      }
      
      .nav-links {
        gap: 24px;
      }
      
      .nav-links a {
        font-size: 15px;
      }
    }

    .nav-links a:hover {
      color: var(--text);
    }
    
    .subtitle {
      display: none; /* Hidden in new layout */
    }

    /* Search Section */
    .search-container {
      margin-bottom: 24px;
      position: relative;
    }
    
    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 14px 16px;
      border-radius: 12px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 16px;
      outline: none;
      transition: all 0.2s;
    }
    
    @media (min-width: 480px) {
      .search-container {
        margin-bottom: 40px;
      }
      
      .search-input {
        padding: 20px 24px;
        font-size: 18px;
      }
    }

    .search-results {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-top: 8px;
      max-height: 250px;
      overflow-y: auto;
      z-index: 100;
      display: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    @media (min-width: 480px) {
      .search-results {
        max-height: 300px;
      }
    }

    .search-result-item {
      padding: 10px 16px;
      display: block;
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }

    @media (min-width: 480px) {
      .search-result-item {
        padding: 12px 20px;
      }
    }

    .search-result-item:last-child {
      border-bottom: none;
    }

    .search-result-meta {
      display: none; /* Hide keywords from search results */
    }

    .search-result-item:hover, .search-result-item.active {
      background: rgba(255, 255, 255, 0.05);
    }
    
    .search-result-title {
        font-weight: 700;
        display: block;
        font-size: 13px;
    }
    
    @media (min-width: 480px) {
      .search-result-title {
        font-size: 14px;
      }
    }
    
    .search-result-meta {
        font-size: 11px;
        color: var(--text-muted);
    }
    
    @media (min-width: 480px) {
      .search-result-meta {
        font-size: 12px;
      }
    }

    .search-no-results {
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .search-no-results-label {
      font-size: 12px;
      color: var(--text-muted);
      font-family: var(--font-body);
    }

    .search-external-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .search-external-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 7px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      font-family: var(--font-display);
      text-decoration: none;
      transition: opacity 0.15s, transform 0.15s;
    }

    .search-external-btn:hover {
      opacity: 0.85;
      transform: scale(1.03);
    }

    .search-external-ung {
      background: #e8f5e9;
      color: #1b5e20;
    }

    .search-external-utd {
      background: #e3f2fd;
      color: #0d47a1;
    }

    [data-theme="dark"] .search-external-ung,
    :not([data-theme="light"]) .search-external-ung {
      background: #1a3320;
      color: #81c784;
    }

    [data-theme="dark"] .search-external-utd,
    :not([data-theme="light"]) .search-external-utd {
      background: #0d2137;
      color: #64b5f6;
    }

    .search-external-vilbli {
      background: #fff3e0;
      color: #e65100;
    }

    [data-theme="dark"] .search-external-vilbli,
    :not([data-theme="light"]) .search-external-vilbli {
      background: #2a1800;
      color: #ffb74d;
    }

    [data-theme="light"] .search-input {
      background: #f5f5f5;
      border: 1px solid #e0e0e0;
      color: #000;
    }

    .search-input:focus {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
    }

    [data-theme="light"] .search-input:focus {
      background: #fff;
      border-color: #ccc;
    }

    /* Main Actions */
    .main-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-bottom: 24px;
    }

    .action-btn {
      padding: 14px 12px;
      border: none;
      border-radius: 8px;
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
      text-decoration: none;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
    }
    
    @media (min-width: 480px) {
      .main-actions {
        grid-template-columns: 1fr 1fr;
        gap: 16px;
        margin-bottom: 32px;
      }
      
      .action-btn {
        padding: 16px;
        font-size: 16px;
      }
    }

    .action-btn:hover {
      transform: scale(1.02);
    }

    .btn-start {
      background: #3e5c35; /* Dark Green */
      color: #b8e994;
    }

    .btn-current {
      background: #2c3e50; /* Dark Blue */
      color: #74b9ff;
    }

    /* Bento Grid */
    .bento-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    @media (min-width: 480px) {
      .bento-grid {
        gap: 16px;
      }
    }

    @media (min-width: 768px) {
      .bento-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (min-width: 1024px) {
      .bento-grid {
        grid-template-columns: repeat(4, 1fr);
      }
    }

    /* Special grid items */
    .grid-item-featured {
      grid-column: 1 / -1;
    }

    @media (min-width: 1024px) {
      .grid-item-featured {
        grid-column: span 2;
      }
    }

    .bento-card {
      padding: 20px;
      border-radius: 4px;
      text-decoration: none;
      color: #000;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1);
      position: relative;
      overflow: hidden;
      min-height: 160px;
    }

    @media (min-width: 480px) {
      .bento-card {
        padding: 28px;
        min-height: 180px;
      }
    }

    @media (min-width: 768px) {
      .bento-card {
        padding: 32px;
      }
    }

    .bento-card:hover {
      transform: scale(1.02);
      z-index: 10;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    .card-title {
      font-family: 'Instrument Serif', serif;
      font-size: 28px;
      font-weight: 400;
      font-style: italic;
      line-height: 0.95;
      letter-spacing: -0.03em;
    }

    @media (min-width: 480px) {
      .card-title {
        font-size: 36px;
      }
    }

    @media (min-width: 768px) {
      .card-title {
        font-size: 42px;
      }
    }

    /* Global card styles - can be used on multiple cards */
    .card-tools {
        background: var(--card-orange);
    }
    
    .card-tools .card-title {
      font-family: 'Inter Tight', sans-serif;
      font-weight: 800;
      font-style: normal;
      font-size: 24px;
    }
    
    @media (min-width: 480px) {
      .card-tools .card-title {
        font-size: 30px;
      }
    }
    
    @media (min-width: 768px) {
      .card-tools .card-title {
        font-size: 36px;
      }
    }
    
    .card-tools .card-icon {
        background: #fff;
        color: #000;
    }

    .card-guides {
        background: var(--card-lime);
    }

    .card-guides .card-title {
      color: #000;
      font-size: 32px;
    }
    
    @media (min-width: 480px) {
      .card-guides .card-title {
        font-size: 40px;
      }
    }

    @media (min-width: 768px) {
      .card-guides .card-title {
        font-size: 48px;
      }
    }

    .card-discord {
        background: var(--card-blue);
    }

    .card-interactive {
        background: var(--card-red);
    }

    .card-fun-fact {
      background: var(--card-green);
      color: #000;
    }

    .card-fun-fact .card-title {
      font-family: 'Manrope', sans-serif;
      font-weight: 600;
      font-style: normal;
      font-size: 18px;
      color: #000;
    }

    @media (min-width: 480px) {
      .card-fun-fact .card-title {
        font-size: 20px;
      }
    }

    @media (min-width: 768px) {
      .card-fun-fact .card-title {
        font-size: 22px;
      }
    }

    .fun-fact-label {
      font-size: 12px;
      font-weight: 600;
      opacity: 0.7;
      margin-bottom: 8px;
    }

    .card-discord .opinion-latest-quote {
      margin-top: 8px;
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: clamp(17px, 2.4vw, 22px);
      font-weight: 400;
      line-height: 1.25;
      color: #fff;
    }

    @media (min-width: 480px) {
      .fun-fact-label {
        font-size: 13px;
      }
    }

    .card-updates {
        background: var(--card-pale);
    }

    .card-updates .card-title {
      font-family: 'Manrope', sans-serif;
      font-weight: 600;
      font-style: normal;
      font-size: 18px;
      color: #000;
    }
    
    @media (min-width: 480px) {
      .card-updates .card-title {
        font-size: 21px;
      }
    }
    
    @media (min-width: 768px) {
      .card-updates .card-title {
        font-size: 24px;
      }
    }
    
    .card-updates-content {
      font-size: 13px;
      color: #666;
    }
    
    @media (min-width: 480px) {
      .card-updates-content {
        font-size: 14px;
      }
    }
    
    @media (min-width: 768px) {
      .card-updates-content {
        font-size: 16px;
      }
    }

    .card-icon {
      background: #000;
      color: #fff;
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-top: auto;
    }
    
    @media (min-width: 480px) {
      .card-icon {
        width: 56px;
        height: 56px;
        font-size: 28px;
      }
    }
    
    @media (min-width: 768px) {
      .card-icon {
        width: 64px;
        height: 64px;
        font-size: 32px;
      }
    }
    
    .card-tools .card-icon {
        background: #fff;
        color: #000;
    }

    .discord-svg {
      width: 80px;
      height: 80px;
      fill: #fff;
    }
    
    /* Footer */
    footer {
        margin-top: 40px;
        text-align: center;
        color: var(--text-muted);
        font-size: 12px;
    }

  </style>
</head>
<body>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // Data for all available content
    const contentData = {
      guides: [
        { title: "Fraværsgrensen?", url: "Guides/absence-rules.html" },
        { title: "Søk til VGS", url: "Guides/vgs-application-process.html" },
        { title: "Få stipend", url: "Guides/student-finances.html" },
        { title: "Eksamenstips", url: "Guides/exams-in-vgs.html" },
        { title: "Hvordan få bedre karakterer?", url: "Guides/grades-system.html" },
        { title: "Karaktersystem", url: "Guides/grades-system.html" },
        { title: "Motivasjon", url: "Guides/motivation.html" },
        { title: "Studier bedre", url: "Guides/study-better-and-grades.html" },
        { title: "Fagvalg", url: "Guides/program-choice.html" },
        { title: "Starte på VGS", url: "Guides/new-students.html" },
        { title: "Nåværende elev", url: "Guides/current-students.html" },
        { title: "Forhold og skole", url: "Guides/student-rights-and-school-life.html" },
        { title: "Dårlige karakterer", url: "Guides/failing-grades.html" },
        { title: "Privat eksamen", url: "Guides/privatist.html" },
        { title: "Bytte skole", url: "Guides/change-school-or-program.html" },
        { title: "Lærlingeplasser", url: "Guides/apprenticeships-and-vocational.html" },
        { title: "Venteliste", url: "Guides/waitlist.html" },
        { title: "Ferdig på VGS", url: "Guides/finished-students.html" },
        { title: "Russefeiringen", url: "Guides/russ-celebration.html" },
        { title: "Deltidsjobb", url: "Guides/part-time-job.html" },
        { title: "Mental helse", url: "Guides/mental-health.html" },
        { title: "Regelbrudd", url: "Guides/rule-violations.html" },
        { title: "Eksamen i Ungdomsskolen", url: "Guides/exams-in-teen.html" },
        { title: "Førstegangsvitnemål", url: "Guides/first-time-diploma.html" }
      ],
      tools: [
        { title: "Inntakskalkulator", url: "Tools/inntakskalkulator.html", icon: "arrow_forward" },
        { title: "Usikkert på hva å velge?", url: "Tools/program-finder.html", icon: "arrow_forward" },
        { title: "Karaktertracker", url: "Tools/grade-tracker.html", icon: "arrow_forward" },
        { title: "Poenggrense", url: "Tools/point-limit.html", icon: "arrow_forward" }
      ],
      interactives: [
        { title: "Eksamen Simulator 2026", url: "Interactives/exam-simulator.html", label: "Prøv" },
        { title: "Fagordbok Flashcards", url: "Interactives/fagordbok-flashcards.html", label: "Quiz" },
        { title: "VGS Grunnleggende Quiz", url: "Interactives/vgs-basics-quiz.html", label: "Test" }
      ]
    };

    const SUPABASE_URL = 'https://wqmkwcrlvgfczbueseip.supabase.co';
    const SUPABASE_ANON = 'sb_publishable_XCDS-VsKHGbOXaaiUWaHIg_sH3sCfLJ';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

    function escHtml(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    async function loadLatestOpinionHome() {
      const el = document.getElementById('opinionBoxContent');
      if (!el) return;
      el.textContent = 'Laster…';
      try {
        const { data, error } = await sb.from('meninger')
          .select('quote')
          .order('created_at', { ascending: false })
          .limit(1);
        if (error) throw error;
        const row = data && data[0];
        const q = row?.quote != null ? String(row.quote).trim() : '';
        if (!q) {
          el.textContent = 'Ingen meninger enda.';
          return;
        }
        el.innerHTML = `«${escHtml(q)}»`;
      } catch (e) {
        console.error('loadLatestOpinionHome:', e);
        el.textContent = 'Kunne ikke laste siste mening.';
      }
    }

    function subscribeOpinionHome() {
      sb.channel('home-meninger-preview')
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'meninger' }, () => loadLatestOpinionHome())
        .on('postgres_changes', { event: 'DELETE', schema: 'public', table: 'meninger' }, () => loadLatestOpinionHome())
        .subscribe();
    }

    // Fun facts that rotate bi-daily
    const funFacts = [

      "Elever med dokumenterte behov (som dysleksi) har rett til utvidet tid og bruk av hjelpemidler som Lingdys på eksamen.",
      "Skoleåret i videregående opplæring består av 190 dager.",
      "På enkelte skoler i Trøndelag og Møre og Romsdal er 'pølse i brød' i kantina en så hellig tradisjon at det blir landesorg om de går tomme.",
      "I mai blir russekort en offisiell valuta blant barneskoleelever, der sjeldne kort kan byttes mot alt fra klistremerker til lunsjavtaler.",
      "Mange elever tror (feilaktig) på den uoffisielle '15-minutters regelen': Hvis læreren er mer enn et kvarter forsinket, kan man dra hjem.",
      "På utdanningsprogrammet Naturbruk er det ofte traktorstørrelsen på parkeringsplassen som gir høyest status, ikke bilmerket.",
      "Uansett hvor moderne skolen er, vil lukten i en gymsal alltid være en mystisk miks av gummisåler, støv og gjenglemt gymtøy fra 90-tallet.",
      "Lærerrommet på en gjennomsnittlig skole forbruker nok kaffe i løpet av et år til å fylle et lite svømmebasseng."
    ];

    // Get bi-daily fun fact (changes every 2 days)
    function getTodaysFunFact() {
      const today = new Date();
      const startDate = new Date('2026-04-22');
      const daysDiff = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
      const biDayIndex = Math.floor(daysDiff / 2) % funFacts.length;
      return funFacts[biDayIndex];
    }

    // Shuffle array (Fisher-Yates)
    function shuffleArray(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    // Create a random selection of cards
    function generateGrid() {
      const grid = document.getElementById('bentoGrid');
      
      // Get random items from each category
      const shuffledGuides = shuffleArray(contentData.guides).slice(0, 8);
      const shuffledTools = shuffleArray(contentData.tools).slice(0, 2);
      const shuffledInteractives = shuffleArray(contentData.interactives).slice(0, 2);

      // Combine all items
      let items = [...shuffledGuides, ...shuffledTools, ...shuffledInteractives];
      let html = '';

      // Add fun fact as featured item
      html += `
        <div class="bento-card card-fun-fact grid-item-featured">
          <div>
            <div class="fun-fact-label">💡 Fun Fact (Update hvert andre dag)</div>
            <div class="card-title">${getTodaysFunFact()}</div>
          </div>
        </div>
      `;

      // Add opinions panel as featured item next to fun fact
      html += `
        <a href="opinions.html" class="bento-card card-discord grid-item-featured" style="color:#fff; text-decoration: none;">
          <div>
            <div class="fun-fact-label">Meninger</div>
            <div id="opinionBoxContent" class="opinion-latest-quote" aria-live="polite">Laster…</div>
          </div>
        </a>
      `;

      // Add all content cards
      items.forEach(item => {
        if (item.icon) {
          // Tool card
          html += `
            <a href="${item.url}" class="bento-card card-tools">
              <div class="card-title">${item.title}</div>
              <div class="card-icon">
                <span class="material-icons">${item.icon}</span>
              </div>
            </a>
          `;
        } else if (item.label) {
          // Interactive card
          html += `
            <a href="${item.url}" class="bento-card card-interactive">
              <div class="card-title" style="font-family: 'Inter Tight', sans-serif; font-weight: 650; color: var(--card-pale);">${item.title}</div>
              <div class="card-icon" style="width:25%; border-radius: 600px;">
                <span class="card-title" style="font-size: 14px;">${item.label}</span>
              </div>
            </a>
          `;
        } else {
          // Guide card
          html += `
            <a href="${item.url}" class="bento-card card-guides">
              <div class="card-title">${item.title}</div>
            </a>
          `;
        }
      });

      // Add link to Updates page
      html += `
        <a href="updates.html" class="bento-card card-updates">
          <div class="card-title" style="margin-bottom: 16px;">Oppdateringer</div>
          <div class="card-updates-content">
            <div style="color: var(--text-muted);">Se alle oppdateringer og nyheter →</div>
          </div>
        </a>
      `;

      grid.innerHTML = html;
    }

    // Generate grid on page load
    document.addEventListener('DOMContentLoaded', () => {
      generateGrid();
      loadLatestOpinionHome();
      subscribeOpinionHome();
      renderBookmarks();
    });

    // Bookmarks on home page
    function renderBookmarks() {
      const section = document.getElementById('bookmarksSection');
      const list = document.getElementById('bookmarksList');
      let bm;
      try { bm = JSON.parse(localStorage.getItem('bookmarks') || '[]'); } catch { bm = []; }
      if (!bm.length) { section.style.display = 'none'; return; }
      section.style.display = 'block';
      // Map URLs to titles from contentData
      const allItems = [...contentData.guides, ...contentData.tools, ...contentData.interactives];
      list.innerHTML = bm.map(url => {
        const item = allItems.find(i => i.url === url);
        const title = item ? item.title : url.split('/').pop().replace('.html', '');
        return `<a href="${url}" style="display:inline-flex;align-items:center;gap:6px;padding:10px 16px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;text-decoration:none;font-size:13px;font-weight:700;font-family:var(--font-display);transition:all 0.2s;"><span class="material-icons" style="font-size:16px;color:var(--card-blue);">bookmark</span>${title}</a>`;
      }).join('');
    }

    // Search Functionality with Semantic Matching
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    let searchData = [];
    let vocabSize = 0;
    let vocab = {};  // token -> index mapping
    let idf = {};    // token -> idf weight

    // Fetch search data
    fetch('search-data.json')
      .then(response => response.json())
      .then(data => {
        searchData = data.items || data;
        vocabSize = data.vocab_size || 0;
        idf = data.idf || {};
        // Build reverse vocab from IDF keys
        Object.keys(idf).forEach((token, idx) => {
          vocab[token] = idx;
        });
      })
      .catch(error => console.error('Error loading search data:', error));

    // Simple tokenizer matching the Python one
    function tokenize(text) {
      const tokens = text.toLowerCase().match(/\b[a-zæøå0-9]+\b/gi) || [];
      return tokens.filter(t => t.length > 2);
    }

    // Calculate cosine similarity between two vectors (sparse format)
    function cosineSimilarity(sparseVec1, sparseVec2) {
      let dotProduct = 0;
      let mag1 = 0;
      let mag2 = 0;

      // Compute dot product and magnitude for vec1
      for (const idx in sparseVec1) {
        const val = sparseVec1[idx];
        mag1 += val * val;
        if (idx in sparseVec2) {
          dotProduct += val * sparseVec2[idx];
        }
      }

      // Compute magnitude for vec2
      for (const idx in sparseVec2) {
        const val = sparseVec2[idx];
        mag2 += val * val;
      }

      mag1 = Math.sqrt(mag1);
      mag2 = Math.sqrt(mag2);

      if (mag1 === 0 || mag2 === 0) return 0;
      return dotProduct / (mag1 * mag2);
    }

    // Create TF-IDF weighted vector for query tokens
    function createQueryVector(tokens) {
      const vector = {};
      const tokenCount = {};
      tokens.forEach(token => {
        tokenCount[token] = (tokenCount[token] || 0) + 1;
      });
      const total = tokens.length;
      for (const token in tokenCount) {
        // Use proper vocabulary index if available
        const idx = vocab[token];
        if (idx !== undefined) {
          const tf = tokenCount[token] / total;
          const idfWeight = idf[token] || 1.0;
          vector[idx] = tf * idfWeight;
        }
      }
      return vector;
    }

    // Search with semantic matching
    function performSearch(query) {
      const queryTokens = tokenize(query);
      const queryVector = createQueryVector(queryTokens);
      const queryLower = query.toLowerCase();

      // Score each item
      const scored = searchData.map(item => {
        let score = 0;

        // Keyword match: exact title match (highest)
        if (item.title.toLowerCase() === queryLower) score += 100;
        // Keyword match: title contains query
        else if (item.title.toLowerCase().includes(queryLower)) score += 50;
        // Keyword match: query word in keywords
        else if (item.keywords && item.keywords.some(k => k.includes(queryLower))) score += 30;

        // Semantic match: cosine similarity on vectors
        if (item.vector && vocabSize > 0) {
          const similarity = cosineSimilarity(queryVector, item.vector);
          score += similarity * 40; // Scale semantic score
        }

        return { item, score };
      });

      // Sort by score and filter out zero-score items
      return scored
        .filter(s => s.score > 0)
        .sort((a, b) => b.score - a.score)
        .slice(0, 8)
        .map(s => s.item);
    }

    searchInput.addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase();
      searchResults.innerHTML = '';

      if (query.length < 2) {
        searchResults.style.display = 'none';
        return;
      }

      const filtered = performSearch(query);

      if (filtered.length > 0) {
        searchResults.style.display = 'block';
        filtered.forEach(item => {
          const div = document.createElement('a');
          div.href = item.url;
          div.className = 'search-result-item';
          div.innerHTML = `
            <span class="search-result-title">${item.title}</span>
            <span class="search-result-meta">${item.keywords?.slice(0, 3).join(', ') || ''}</span>
          `;
          searchResults.appendChild(div);
        });
      } else {
        searchResults.style.display = 'block';
        searchResults.innerHTML = `
          <div class="search-no-results">
            <span class="search-no-results-label">Ingen resultater. Søk fra en annen kilde?</span>
            <div class="search-external-links">
              <a href="https://www.ung.no/sok?query=${encodeURIComponent(e.target.value)}" target="_blank" class="search-external-btn search-external-ung">
                <span class="material-icons" style="font-size:15px">open_in_new</span>
                Søk på ung.no
              </a>
              <a href="https://utdanning.no/sok/#query_value=${encodeURIComponent(e.target.value)}" target="_blank" class="search-external-btn search-external-utd">
                <span class="material-icons" style="font-size:15px">open_in_new</span>
                Søk på utdanning.no
              </a>
              <a href="https://www.vilbli.no/nb/no/sok?elastic=search&q=${encodeURIComponent(e.target.value)}" target="_blank" class="search-external-btn search-external-vilbli">
                <span class="material-icons" style="font-size:15px">open_in_new</span>
                Søk på vilbli.no
              </a>
            </div>
          </div>
        `;
      }
    });

    // Close search when clicking outside
    document.addEventListener('click', (e) => {
      if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
        searchResults.style.display = 'none';
      }
    });

    // Handle Enter key to go to first result
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const firstResult = searchResults.querySelector('a');
        if (firstResult) {
          window.location.href = firstResult.href;
        }
      }
    });

    // Simple theme init (defaults to dark for the 'bold' look)
    // The previous theme logic is preserved but simplified
    if (!localStorage.getItem('theme')) {
        localStorage.setItem('theme', 'dark');
    }
    document.documentElement.setAttribute('data-theme', localStorage.getItem('theme'));
  </script>
