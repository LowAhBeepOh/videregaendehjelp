  <style>
    :root {
      /* Bold Palette */
      --bg: #050505; 
      --text: #ffffff;
      --text-muted: #888;
      
      --card-red: #d40b00;
      --card-lime: #D0F54E;
      --card-blue: #5865F2;
      --card-orange: #FF9F0A;
      --card-green: #30D158;
      --card-pale: #F2F2F7;
      
      --surface: #1c1c1e;
      --border: #2c2c2e;
      
      /* Typography */
      --font-display: 'Inter Tight', sans-serif;
      --font-body: 'Manrope', sans-serif;
      --font-serif: 'Instrument Serif', serif;
      
      --ls-tight: -0.015em;
      --ls-normal: -0.01em;
    }

    [data-theme="light"] {
      --bg: #ffffff;
      --text: #000000;
      --text-muted: #555;
      --surface: #f2f2f7;
      --border: #e5e5ea;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
      overflow-x: hidden;
      letter-spacing: var(--ls-normal);
    }

    /* Layout */
    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 16px 40px 16px;
    }

    @media (min-width: 480px) {
      main { padding: 0 20px 60px 20px; }
    }

    /* Header */
    header {
      padding: 20px 0;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 1000;
    }
    
    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.04em;
      transition: opacity 0.2s;
    }

    .logo:hover { opacity: 0.8; }

    .nav-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      padding: 8px 12px;
      border-radius: 10px;
      transition: all 0.2s;
    }

    .nav-link:hover {
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
    }

    .nav-link .material-icons { 
      font-size: 20px; 
    }

    .nav-link span { display: none; }
    @media (min-width: 850px) { .nav-link span { display: inline; } }

    /* Header-right wrapper — keeps nav-container and profile-pill aligned */
    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    /* Responsive Nav */
    @media (max-width: 650px) {
      .nav-link.nav-news { display: none; }
    }

    .burger-btn {
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      padding: 8px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }

    .burger-btn:hover { background: rgba(255, 255, 255, 0.05); }

    /* Custom Dropdown */
    .nav-dropdown {
      position: absolute;
      top: 100%;
      right: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 8px;
      min-width: 220px;
      box-shadow: 0 15px 40px rgba(0,0,0,0.6);
      display: none;
      flex-direction: column;
      gap: 4px;
      z-index: 1001;
      margin-top: 12px;
    }

    .nav-dropdown.active { display: flex; }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      color: var(--text);
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      border-radius: 10px;
      transition: background 0.2s;
    }

    .dropdown-item:hover { background: rgba(255, 255, 255, 0.08); }
    .dropdown-item .material-icons { font-size: 18px; color: var(--text-muted); }

    /* Search Section */
    .search-container {
      margin-bottom: 32px;
      position: relative;
    }

    .user-heading {
      font-family: var(--font-display);
      font-size: 36px;
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.04em;
      margin-bottom: 12px;
      color: var(--text);
    }

    @media (min-width: 768px) {
      .user-heading { font-size: 48px; }
    }

    .user-heading-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .user-heading-row .user-heading { margin-bottom: 0; }

    .profile-cta {
      display: flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      margin: 0;
      padding: 8px 14px;
      background: var(--card-blue);
      color: #fff;
      border-radius: 999px;
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 14px;
      text-decoration: none;
      transition: filter 0.2s ease, transform 0.2s ease;
    }
    .profile-cta:hover {
      filter: brightness(1.08);
      transform: translateY(-1px);
    }
    .profile-cta[hidden] { display: none; }
    .profile-cta .material-icons { font-size: 18px; }

    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 16px 20px;
      border-radius: 14px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 16px;
      outline: none;
      transition: all 0.2s;
      letter-spacing: var(--ls-tight);
    }
    
    @media (min-width: 480px) {
      .search-input { padding: 22px 28px; font-size: 18px; }
    }

    .search-input:focus {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.25);
    }

    .search-results {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-top: 10px;
      max-height: 400px;
      overflow-y: auto;
      z-index: 100;
      display: none;
      box-shadow: 0 15px 40px rgba(0,0,0,0.6);
    }

    .search-result-item {
      padding: 16px 24px;
      display: block;
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }

    .search-result-item:hover { background: rgba(255, 255, 255, 0.05); }
    .search-result-title { font-weight: 700; font-size: 15px; display: block; }
    .search-result-meta { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

    /* No Results Styling */
    .search-no-results {
      padding: 32px 24px;
      text-align: center;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }

    .search-no-results-label {
      font-weight: 600;
      font-size: 16px;
      color: var(--text);
    }

    .search-external-links {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .search-external-btn {
      padding: 10px 20px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-block;
    }

    .search-external-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    .search-external-ung {
      background: #30D158;
      color: #000;
    }

    .search-external-ung:hover {
      background: #27c14a;
    }

    .search-external-vilbli {
      background: #5865F2;
      color: #fff;
    }

    .search-external-vilbli:hover {
      background: #4752d4;
    }

    .search-external-utd {
      background: #FF9F0A;
      color: #000;
    }

    .search-external-utd:hover {
      background: #e68a00;
    }

    /* Quick Start CTA row removed — guides are reached via the bento grid below. */

    /* Bento Grid */
    .bento-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    @media (min-width: 768px) { .bento-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (min-width: 1024px) { .bento-grid { grid-template-columns: repeat(4, 1fr); } }

    .grid-item-featured { grid-column: 1 / -1; }
    @media (min-width: 1024px) { .grid-item-featured { grid-column: span 2; } }
    .grid-item-news-featured { grid-column: 1 / -1; }

    /* Card Styles */
    .bento-card {
      padding: 24px;
      border-radius: 16px;
      text-decoration: none;
      color: #000;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: all 0.3s cubic-bezier(0.2, 0, 0, 1);
      position: relative;
      overflow: hidden;
      min-height: 180px;
    }

    @media (min-width: 768px) { .bento-card { padding: 32px; min-height: 220px; } }

    .bento-card:hover {
      transform: translateY(-8px);
      box-shadow: 0 15px 35px rgba(0,0,0,0.3);
    }

    .card-title {
      font-family: var(--font-serif);
      font-size: 32px;
      font-weight: 400;
      font-style: italic;
      line-height: 1.0;
      letter-spacing: -0.03em;
    }

    @media (min-width: 768px) { .card-title { font-size: 42px; } }

    /* Guide Blocks */
    .card-guides {
      background: var(--card-lime);
      color: #000;
    }

    .guide-arrow {
      position: absolute;
      top: 24px;
      right: 24px;
      font-size: 24px;
      opacity: 0.15;
      transition: all 0.3s;
    }

    .card-guides:hover .guide-arrow {
      opacity: 0.5;
      transform: translate(4px, -4px);
    }

    /* Tools & Interactives */
    .card-tools { background: var(--card-orange); }
    .card-tools .card-title { font-family: var(--font-display); font-weight: 800; font-style: normal; font-size: 26px; letter-spacing: -0.04em; }
    
    .card-interactive { background: var(--card-red); color: #fff; }
    .card-interactive .card-title { color: #fff; font-family: var(--font-display); font-weight: 800; font-style: normal; font-size: 26px; letter-spacing: -0.04em; }

    .card-fun-fact { background: var(--card-green); }
    .card-fun-fact .card-title { font-family: var(--font-body); font-weight: 700; font-style: normal; font-size: 22px; letter-spacing: -0.02em; line-height: 1.3; }

    .fun-fact-label, .opinions-label {
      font-size: 12px;
      font-weight: 800;
      opacity: 0.6;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .card-opinions { background: var(--card-blue); color: #fff; }
    .card-opinions .card-title { font-family: var(--font-serif); font-style: italic; font-size: 24px; color: #fff; line-height: 1.25; }

    .card-icon {
      background: rgba(0,0,0,0.1);
      color: #000;
      width: 48px;
      height: 48px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-top: auto;
    }

    .card-interactive .card-icon { background: rgba(255,255,255,0.15); color: #fff; }

    /* News Featured Card */
    .news-featured-card {
      display: grid;
      grid-template-columns: 1fr;
      border-radius: 20px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      min-height: 420px;
      transition: all 0.4s cubic-bezier(0.2, 0, 0, 1);
    }

    @media (min-width: 768px) { .news-featured-card { grid-template-columns: 1.3fr 1fr; } }

    .news-featured-left { padding: 40px; display: flex; flex-direction: column; justify-content: space-between; }
    .news-featured-date { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 20px; opacity: 0.6; }
    .news-featured-title { font-family: var(--font-display); font-size: 36px; font-weight: 800; line-height: 1.1; margin-bottom: 20px; letter-spacing: -0.05em; }
    .news-featured-desc { font-size: 17px; line-height: 1.6; margin-bottom: 32px; opacity: 0.9; }
    .news-featured-link { display: inline-flex; align-items: center; gap: 10px; font-weight: 800; font-size: 15px; margin-top: auto; }
    .news-featured-right { overflow: hidden; position: relative; }
    .news-featured-image { width: 100%; height: 100%; object-fit: cover; transition: transform 0.6s; }
    .news-featured-card:hover { transform: translateY(-10px); box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
    .news-featured-card:hover .news-featured-image { transform: scale(1.08); }

    /* Bookmarks */
    .bookmarks-section { margin-bottom: 48px; }
    .bookmarks-title { font-family: var(--font-display); font-size: 18px; font-weight: 800; margin-bottom: 20px; color: var(--text-muted); display: flex; align-items: center; gap: 10px; letter-spacing: -0.02em; }
    .bookmarks-list { display: flex; gap: 14px; flex-wrap: wrap; }
    .bookmark-item { display: inline-flex; align-items: center; gap: 10px; padding: 12px 20px; background: var(--surface); border: 1px solid var(--border); color: var(--text); border-radius: 14px; text-decoration: none; font-size: 14px; font-weight: 700; transition: all 0.2s; }
    .bookmark-item:hover { background: rgba(255,255,255,0.1); transform: translateY(-3px); }

    /* Footer */
    footer { margin-top: 100px; text-align: center; color: var(--text-muted); font-size: 14px; padding: 80px 0; border-top: 1px solid var(--border); }
  </style>
</head>

    function getTodaysFunFact() {
      const today = new Date();
      const startDate = new Date('2026-04-12');
      const hoursDiff = Math.floor((today - startDate) / (1000 * 60 * 60));
      const rotationIndex = Math.floor(Math.max(0, hoursDiff) / 12);
      return funFacts[rotationIndex % funFacts.length];
    }

    function shuffleArray(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function generateGrid() {
      const grid = document.getElementById('bentoGrid');
      const shuffledGuides = shuffleArray(contentData.guides).slice(0, 8);
      const shuffledTools = shuffleArray(contentData.tools).slice(0, 4);

      let html = '';

      // Fun fact featured
      html += `
        <div class="bento-card card-fun-fact grid-item-featured">

    // News logic
    function formatNewsDate(dateString) {
      const date = new Date(dateString);
      return isNaN(date.getTime()) ? dateString : date.toLocaleDateString('no-NO', { day: '2-digit', month: 'long', year: 'numeric' });
    }

    function getDominantColor(imgElement) {
      return new Promise((resolve) => {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.crossOrigin = 'anonymous';
        img.onload = () => {
          canvas.width = img.width; canvas.height = img.height;
          ctx.drawImage(img, 0, 0);
          const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
          let r = 0, g = 0, b = 0, count = 0;
          for (let i = 0; i < data.length; i += 16) { 
            const red = data[i], green = data[i+1], blue = data[i+2];
            const max = Math.max(red, green, blue), min = Math.min(red, green, blue);
            const saturation = max === 0 ? 0 : (max - min) / max;
            if (saturation > 0.3 && max > 40 && max < 220) {
              r += red; g += green; b += blue; count++;
            }
          }
          if (count === 0) {
            for (let i = 0; i < data.length; i += 16) { r += data[i]; g += data[i+1]; b += data[i+2]; count++; }
          }
          resolve({ r: Math.round(r/count), g: Math.round(g/count), b: Math.round(b/count) });
        };
        img.onerror = () => resolve({ r: 48, g: 62, b: 80 });
        img.src = imgElement.src;
      });
    }

    function getContrastColor(r, g, b) {
      const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      return luminance > 0.5 ? '#000000' : '#ffffff';
    }

    let featuredNewsItems = [];
    let currentFeaturedIndex = 0;
    function renderFeaturedNews(rawNews) {
      const container = document.getElementById('newsFeaturedContainer');
      if (!container) return;
      const sorted = (Array.isArray(rawNews) ? rawNews : (rawNews.news || [])).sort((a, b) => new Date(b.date) - new Date(a.date));
      if (!sorted.length) return;
      featuredNewsItems = sorted.slice(0, 3);
      const render = () => {
        const item = featuredNewsItems[currentFeaturedIndex];
        container.innerHTML = `
          <a href="${item.link}" class="news-featured-card">
            <div class="news-featured-left" id="featuredLeft">
              <div>
                <div class="news-featured-date" id="featuredDate">${escHtml(formatNewsDate(item.date))}</div>
                <h3 class="news-featured-title" id="featuredTitle">${escHtml(item.name)}</h3>
                <p class="news-featured-desc" id="featuredDesc">${escHtml(item.desc)}</p>
              </div>
              <div class="news-featured-link" id="featuredLink">Les saken <i class="material-icons" style="font-size:16px;">arrow_forward</i></div>
            </div>
            <div class="news-featured-right"><img src="${item.thumb}" class="news-featured-image" id="featuredImg"></div>
          </a>
        `;
        const img = document.getElementById('featuredImg');
        getDominantColor(img).then(color => {
          const left = document.getElementById('featuredLeft');
          const contrast = getContrastColor(color.r, color.g, color.b);
          left.style.backgroundColor = `rgb(${color.r},${color.g},${color.b})`;
          left.style.color = contrast;
          document.getElementById('featuredTitle').style.color = contrast;
          document.getElementById('featuredLink').style.color = contrast;
          document.getElementById('featuredDate').style.color = contrast === '#000000' ? 'rgba(0,0,0,0.5)' : 'rgba(255,255,255,0.6)';
          document.getElementById('featuredDesc').style.color = contrast === '#000000' ? 'rgba(0,0,0,0.8)' : 'rgba(255,255,255,0.85)';
        });
      };
      render();
      if (featuredNewsItems.length > 1) setInterval(() => { currentFeaturedIndex = (currentFeaturedIndex + 1) % featuredNewsItems.length; render(); }, 20000);
    }

    // Header & Dropdown
    const burgerBtn = document.getElementById('burgerBtn');
    const navDropdown = document.getElementById('navDropdown');
    burgerBtn.addEventListener('click', (e) => {
      e.stopPropagation();
      navDropdown.classList.toggle('active');
    });

    function handleResize() {
      const isSmall = window.innerWidth < 650;
      document.querySelector('.nav-news-mobile').style.display = isSmall ? 'flex' : 'none';
    }
    window.addEventListener('resize', handleResize);

    // Search logic
    let searchData = [], vocab = {}, idf = {}, vocabSize = 0;
    fetch('search-data.json').then(r => r.json()).then(data => {
      searchData = data.items || data;
      vocabSize = data.vocab_size || 0;
      idf = data.idf || {};
      Object.keys(idf).forEach((t, i) => vocab[t] = i);
    }).catch(e => console.error('Error loading search data:', e));

    function tokenize(t) { return (t.toLowerCase().match(/\b[a-zæøå0-9]+\b/gi) || []).filter(s => s.length > 2); }
    function cosineSimilarity(v1, v2) {
      let dot = 0, m1 = 0, m2 = 0;
      for (const i in v1) { m1 += v1[i]**2; if (i in v2) dot += v1[i]*v2[i]; }
      for (const i in v2) m2 += v2[i]**2;
      return (m1 && m2) ? dot / (Math.sqrt(m1) * Math.sqrt(m2)) : 0;
    }
    function createQueryVector(tokens) {
      const v = {};
      tokens.forEach(t => {
        const idx = vocab[t];
        if (idx !== undefined) v[idx] = (v[idx] || 0) + (idf[t] || 1.0) / tokens.length;
      });
      return v;
    }

    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    searchInput.addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase();
      if (query.length < 2) { searchResults.style.display = 'none'; return; }
      const tokens = tokenize(query), qVec = createQueryVector(tokens);
      const scored = searchData.map(item => {
        let s = 0;
        if (item.title.toLowerCase() === query) s += 100;
        else if (item.title.toLowerCase().includes(query)) s += 50;
        else if (item.keywords && item.keywords.some(k => k.includes(query))) s += 30;
        if (item.vector && vocabSize > 0) s += cosineSimilarity(qVec, item.vector) * 40;
        return { item, s };
      }).filter(x => x.s > 0).sort((a,b) => b.s - a.s).slice(0, 8);

      if (scored.length) {
        searchResults.style.display = 'block';
        searchResults.innerHTML = scored.map(x => `<a href="${x.item.url}" class="search-result-item"><span class="search-result-title">${x.item.title}</span><span class="search-result-meta">${x.item.keywords?.slice(0,3).join(', ') || ''}</span></a>`).join('');
      } else {
        searchResults.style.display = 'block';
        searchResults.innerHTML = `<div class="search-no-results"><span class="search-no-results-label">Ingen resultater. Søk eksternt?</span><div class="search-external-links">
          <a href="https://www.ung.no/sok?query=${encodeURIComponent(query)}" target="_blank" class="search-external-btn search-external-ung">ung.no</a>
          <a href="https://utdanning.no/sok/#query_value=${encodeURIComponent(query)}" target="_blank" class="search-external-btn search-external-utd">utdanning.no</a>
          <a href="https://www.vilbli.no/nb/no/sok?elastic=search&q=${encodeURIComponent(query)}" target="_blank" class="search-external-btn search-external-vilbli">vilbli.no</a>
        </div></div>`;
      }
    });

    function renderBookmarks() {
      const section = document.getElementById('bookmarksSection'), list = document.getElementById('bookmarksList');
      let bm = JSON.parse(localStorage.getItem('bookmarks') || '[]');
      if (!bm.length) { section.style.display = 'none'; return; }
      section.style.display = 'block';
      const all = [...contentData.guides, ...contentData.tools, ...contentData.resources];
      list.innerHTML = bm.map(url => {
        const item = all.find(i => i.url === url);
        return `<a href="${url}" class="bookmark-item"><i class="material-icons" style="font-size:16px;color:var(--card-blue);">bookmark</i>${item ? item.title : url}</a>`;
      }).join('');
    }

    function paintGreeting() {
      if (!window.VHprofile) return;
      const heading = document.getElementById('userHeading');
      const cta = document.getElementById('profileCta');
      if (!heading || !cta) return;
      const DEFAULT_NAME = 'Bruker';
      const name = VHprofile.get().name;
      // No profile yet: fixed welcoming greeting + clear CTA to set one up.
      // Has profile: random greeting + name.
      if (!name || name === DEFAULT_NAME) {
        heading.textContent = 'Velkommen, Elev';
        cta.hidden = false;
      } else {
        const greetings = [
          'Hei', 'Heia', 'Yo', 'Skjer\u2019a', 'Velkommen',
          'Godt \u00e5 se deg', 'Hallais', 'Hallaien', 'Halla',
          'Yo gang', 'Hi m8', 'G\u2019day mate', 'Heisann',
          'Hallo', 'Salut', 'H\u00e9', 'Hva skjer\u2019a',
          'Halla p\u00e5 deg', 'Hei igjen', 'St\u00e5 p\u00e5',
        ];
        const greeting = greetings[Math.floor(Math.random() * greetings.length)];
        heading.textContent = `${greeting}, ${name}`;
        cta.hidden = true;
      }
      heading.hidden = false;
    }

    document.addEventListener('DOMContentLoaded', () => {
      generateGrid(); loadLatestOpinionHome(); subscribeOpinionHome(); renderBookmarks();
      fetch('News/news-data.json').then(r => r.json()).then(d => renderFeaturedNews(d)).catch(e => console.error(e));
    });
    // Resolve stored 'system'|'light'|'dark' before first paint.
    // Pairs with VHprofile.applyTheme() which re-runs at end of body.
    (function () {
      var stored = localStorage.getItem('theme') || 'dark';
      var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      var resolved = stored === 'system' ? (prefersDark ? 'dark' : 'light') : stored;
      document.documentElement.setAttribute('data-theme', resolved);
    })();
  </script>
  <script src="Assets/js/profile.js"></script>
  <script>
    // Paint greeting on first load + re-paint after any profile change so the
    // name stays in sync if the user updates it on profile.html in another tab.
    (function () {
      function run() { try { paintGreeting(); } catch (e) {} }
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', run);
      } else {
        run();
      }
    })();
  </script>
