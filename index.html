<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Videregående Hjelp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <style>
    :root {
      /* Bold Palette */
      --bg: #050505; 
      --text: #ffffff;
      --text-muted: #888;
      
      --card-red: #FF453A;
      --card-lime: #D0F54E; /* Acid Lime/Yellow */
      --card-blue: #5865F2; /* Discord Blurple */
      --card-orange: #FF9F0A;
      --card-green: #30D158;
      --card-pale: #F2F2F7;
      
      --surface: #1c1c1e;
      --border: #2c2c2e;
      
      /* Typography */
      --font-display: 'Inter Tight', sans-serif;
      --font-body: 'Manrope', sans-serif;
    }

    [data-theme="light"] {
      --bg: #ffffff;
      --text: #000000;
      --text-muted: #555;
      --surface: #f2f2f7;
      --border: #e5e5ea;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.4;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Layout */
    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 20px 60px 20px;
    }

    /* Header */
    header {
      padding: 20px 0;
      margin-bottom: 40px;
      border-bottom: 1px solid var(--border);
    }

    .header-content {
      max-width: 1000px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 24px;
      font-weight: 800;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.03em;
    }

    .nav-links {
      display: flex;
      gap: 24px;
    }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 15px;
      transition: color 0.2s;
    }

    .nav-links a:hover {
      color: var(--text);
    }
    
    .subtitle {
      display: none; /* Hidden in new layout */
    }

    /* Search Section */
    .search-container {
      margin-bottom: 40px;
      position: relative;
    }
    
    .search-input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 20px 24px;
      border-radius: 12px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 18px;
      outline: none;
      transition: all 0.2s;
    }

    .search-results {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-top: 8px;
      max-height: 300px;
      overflow-y: auto;
      z-index: 100;
      display: none;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    .search-result-item {
      padding: 12px 20px;
      display: block;
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: background 0.2s;
    }

    .search-result-item:last-child {
      border-bottom: none;
    }

    .search-result-item:hover, .search-result-item.active {
      background: rgba(255, 255, 255, 0.05);
    }
    
    .search-result-title {
        font-weight: 700;
        display: block;
    }
    
    .search-result-meta {
        font-size: 12px;
        color: var(--text-muted);
    }

    [data-theme="light"] .search-input {
      background: #f5f5f5;
      border: 1px solid #e0e0e0;
      color: #000;
    }

    .search-input:focus {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
    }

    [data-theme="light"] .search-input:focus {
      background: #fff;
      border-color: #ccc;
    }

    /* Main Actions */
    .main-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 32px;
    }

    .action-btn {
      padding: 16px;
      border: none;
      border-radius: 8px;
      font-family: var(--font-display);
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
      text-decoration: none;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .action-btn:hover {
      transform: scale(1.02);
    }

    .btn-start {
      background: #3e5c35; /* Dark Green */
      color: #b8e994;
    }

    .btn-current {
      background: #2c3e50; /* Dark Blue */
      color: #74b9ff;
    }

    /* Bento Grid */
    .bento-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    @media (min-width: 768px) {
      .bento-grid {
        grid-template-columns: repeat(2, 1fr);
        grid-template-rows: repeat(3, minmax(240px, auto));
      }
      
      .card-calc {
        grid-column: 1 / 2;
        grid-row: 1 / 2;
      }

      .card-grades {
        grid-column: 2 / 3;
        grid-row: 1 / 2;
        background: var(--card-lime);
      }

      .card-discord {
        grid-column: 1 / 2;
        grid-row: 2 / 3;
        background: var(--card-blue);
      }

      .card-choice {
        grid-column: 2 / 3;
        grid-row: 2 / 3;
        background: var(--card-red); /* Using Red for Choice as per user hint/boldness */
      }

      .card-updates {
        grid-column: 1 / 3; /* Spans full width at bottom */
        grid-row: 3 / 4;
        min-height: 180px;
        background: var(--card-pale);
      }
    }

    .bento-card {
      padding: 32px;
      border-radius: 4px; /* Sharp corners */
      text-decoration: none;
      color: #000;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 0.2s cubic-bezier(0.2, 0, 0, 1);
      position: relative;
      overflow: hidden;
    }

    .bento-card:hover {
      transform: scale(1.02);
      z-index: 10;
      box-shadow: 0 20px 40px rgba(0,0,0,0.2);
    }

    .card-title {
      font-family: 'Instrument Serif', serif;
      font-size: 42px; /* Bigger bold text */
      font-weight: 400; /* Serif usually looks better regular/italic */
      font-style: italic;
      line-height: 0.95;
      letter-spacing: -0.03em;
    }

    /* Override for specific cards */
    .card-calc .card-title {
      font-family: 'Inter Tight', sans-serif;
      font-weight: 800;
      font-style: normal;
      font-size: 36px;
    }
    
    .card-calc {
        background: var(--card-orange);
    }

    .card-grades .card-title {
      color: #000;
      font-size: 48px;
    }

    .card-choice .card-title {
      font-family: 'Inter Tight', sans-serif;
      font-weight: 700;
      font-style: normal;
      font-size: 32px;
      color: #000;
    }

    .card-updates .card-title {
      font-family: 'Manrope', sans-serif;
      font-weight: 600;
      font-style: normal;
      font-size: 24px;
      color: #000;
    }

    .card-icon {
      background: #000;
      color: #fff;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin-top: auto;
    }
    
    .card-calc .card-icon {
        background: #fff;
        color: #000;
    }
    
    .card-choice .card-icon {
        background: #fff;
        color: #000;
    }

    .discord-svg {
      width: 80px;
      height: 80px;
      fill: #fff;
    }
    
    /* Footer */
    footer {
        margin-top: 40px;
        text-align: center;
        color: var(--text-muted);
        font-size: 12px;
    }

  </style>
</head>
<body>
  <main>
    <header>
      <div class="header-content">
        <a href="/" class="logo">Videregående Hjelp</a>
        <nav class="nav-links">
          <a href="guides.html">Guider</a>
          <a href="tools.html">Verktøy</a>
          <a href="interactives.html">Interaktivt</a>
        </nav>
      </div>
    </header>

    <div class="search-container">
      <input type="text" id="searchInput" class="search-input" placeholder="Søk etter guider, verktøy..." autocomplete="off">
      <div id="searchResults" class="search-results"></div>
    </div>

    <div class="main-actions">
      <a href="Guides/new-students.html" class="action-btn btn-start">
        Jeg starter på videregående
      </a>
      <a href="Guides/current-students.html" class="action-btn btn-current">
        Jeg går på videregående
      </a>
    </div>

    <div class="bento-grid">
      <!-- Inntakskalkulator -->
      <a href="Tools/inntakskalkulator.html" class="bento-card card-calc">
        <div class="card-title">Inntakskalkulator</div>
        <div class="card-icon">
          <span class="material-icons">arrow_forward</span>
        </div>
      </a>

      <!-- Bedre Karakterer -->
      <a href="Guides/grades-system.html" class="bento-card card-grades">
        <div class="card-title">Hvordan få bedre karakterer?</div>
      </a>

      <!-- Discord -->
      <a href="#" class="bento-card card-discord" style="justify-content: center; align-items: center;">
        <svg class="discord-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 127.14 96.36">
          <path d="M107.7,8.07A105.15,105.15,0,0,0,81.47,0a72.06,72.06,0,0,0-3.36,6.83A97.68,97.68,0,0,0,49,6.83,72.37,72.37,0,0,0,45.64,0,105.89,105.89,0,0,0,19.39,8.09C2.79,32.65-1.71,56.6.54,80.21h0A105.73,105.73,0,0,0,32.71,96.36,77.11,77.11,0,0,0,39.6,85.25a68.42,68.42,0,0,1-10.85-5.18c.91-.66,1.8-1.34,2.66-2a75.57,75.57,0,0,0,64.32,0c.87.71,1.76,1.39,2.66,2a68.68,68.42,0,0,1-10.87,5.19,77,77,0,0,0,6.89,11.1A105.25,105.25,0,0,0,126.6,80.22c2.36-24.44-4.2-50.1-20.8-74.15ZM42.45,65.69C36.18,65.69,31,60,31,53s5-12.74,11.43-12.74S54,46,53.89,53,48.84,65.69,42.45,65.69Zm42.24,0C78.41,65.69,73.25,60,73.25,53s5-12.74,11.44-12.74S96.23,46,96.12,53,91.08,65.69,84.69,65.69Z"/>
        </svg>
      </a>

      <!-- Usikkert valg -->
      <a href="Guides/program-choice.html" class="bento-card card-choice">
        <div class="card-title">Usikkert på hva å velg?</div>
        <div class="card-icon">
          <span class="material-icons">arrow_forward</span>
        </div>
      </a>
      
      <!-- Oppdateringer -->
       <a href="#" class="bento-card card-updates">
        <div class="card-title" style="margin-bottom: 16px;">Oppdateringer</div>
        <div style="font-size: 16px; color: #555;">
          <div style="margin-bottom: 8px;"><strong>Ny kalkulator</strong> • Lagt til støtte for Rogaland og Akershus</div>
          <div><strong>Nettside</strong> • Nytt design lansert!</div>
        </div>
      </a>

    </div>
  </main>

  <script>
    // Search Functionality
    const searchInput = document.getElementById('searchInput');
    const searchResults = document.getElementById('searchResults');
    let searchData = [];

    // Fetch search data
    fetch('search-data.json')
      .then(response => response.json())
      .then(data => {
        searchData = data;
      })
      .catch(error => console.error('Error loading search data:', error));

    searchInput.addEventListener('input', (e) => {
      const query = e.target.value.toLowerCase();
      searchResults.innerHTML = '';
      
      if (query.length < 2) {
        searchResults.style.display = 'none';
        return;
      }

      const filtered = searchData.filter(item => {
        return item.title.toLowerCase().includes(query) || 
               item.keywords.some(k => k.toLowerCase().includes(query));
      });

      if (filtered.length > 0) {
        searchResults.style.display = 'block';
        filtered.slice(0, 8).forEach(item => {
          const div = document.createElement('a');
          div.href = item.url;
          div.className = 'search-result-item';
          div.innerHTML = `
            <span class="search-result-title">${item.title}</span>
            <span class="search-result-meta">${item.keywords.slice(0, 3).join(', ')}</span>
          `;
          searchResults.appendChild(div);
        });
      } else {
        searchResults.style.display = 'none';
      }
    });

    // Close search when clicking outside
    document.addEventListener('click', (e) => {
      if (!searchInput.contains(e.target) && !searchResults.contains(e.target)) {
        searchResults.style.display = 'none';
      }
    });

    // Handle Enter key to go to first result
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        const firstResult = searchResults.querySelector('a');
        if (firstResult) {
          window.location.href = firstResult.href;
        }
      }
    });

    // Simple theme init (defaults to dark for the 'bold' look)
    // The previous theme logic is preserved but simplified
    if (!localStorage.getItem('theme')) {
        localStorage.setItem('theme', 'dark');
    }
    document.documentElement.setAttribute('data-theme', localStorage.getItem('theme'));
  </script>
</body>
</html>
