<!DOCTYPE html>
<html lang="no">
<head>
  <script defer src="https://cloud.umami.is/script.js" data-website-id="24f80a75-a09f-4f80-94e0-d9103f0d734d"></script>
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Nyheter - Videregående Hjelp. Hold deg oppdatert på det nyeste innen videregående skole, eksamensregler, og studierettigheter.">
  <title>Nyheter - Videregående Hjelp</title>
  <link rel="shortcut icon" href="vgshjelp-logo.png" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter+Tight:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="Assets/css/profile.css">
  <style>
    :root {
      --bg: #050505; 
      --text: #ffffff;
      --text-muted: #888;
      --surface: #1c1c1e;
      --border: #2c2c2e;
      --card-red: #D40B00;
      --card-green: #30D158;
      --card-lime: #D0F54E; 
      --font-display: 'Inter Tight', sans-serif;
      --font-body: 'Manrope', sans-serif;
    }

    [data-theme="light"] {
      --bg: #ffffff;
      --text: #000000;
      --text-muted: #555;
      --surface: #f2f2f7;
      --border: #e5e5ea;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      line-height: 1.4;
      min-height: 100vh;
    }

    main {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 16px 60px 16px;
    }

    header {
      padding: 12px 0;
      margin-bottom: 32px;
      border-bottom: 1px solid var(--border);
    }
    
    @media (min-width: 480px) {
      main { padding: 0 20px 80px 20px; }
      header { padding: 20px 0; margin-bottom: 48px; }
    }

    .header-content {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 16px;
    }

    .logo {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 800;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.03em;
    }
    
    @media (min-width: 480px) { .logo { font-size: 24px; } }

    .nav-links { display: flex; gap: 12px; }
    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 600;
      font-size: 13px;
      transition: color 0.2s;
    }
    @media (min-width: 480px) {
      .nav-links { gap: 24px; }
      .nav-links a { font-size: 15px; }
    }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .page-header {
      margin-bottom: 40px;
    }

    .page-title {
      font-family: var(--font-display);
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
    }

    .page-desc {
      color: var(--text-muted);
      font-size: 16px;
    }

    /* News Grid */
    .news-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 768px) {
      .news-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 32px;
      }
    }

    @media (min-width: 1024px) {
      .news-grid {
        grid-template-columns: repeat(3, 1fr);
      }
    }

    .news-card {
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s, box-shadow 0.2s;
      height: 100%;
    }

    .news-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.15);
      border-color: rgba(255,255,255,0.1);
    }

    .news-thumb-container {
      width: 100%;
      aspect-ratio: 16 / 9;
      position: relative;
      overflow: hidden;
    }

    .news-thumb {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.5s;
    }

    .news-card:hover .news-thumb {
      transform: scale(1.05);
    }

    .news-content {
      padding: 24px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
    }

    .news-date {
      color: var(--card-red);
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .news-title {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 12px;
      color: var(--text);
    }

    .news-desc {
      color: var(--text-muted);
      font-size: 15px;
      line-height: 1.5;
      margin-bottom: 24px;
      flex-grow: 1;
    }

    .news-read-more {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 700;
      font-size: 14px;
      color: var(--text);
      margin-top: auto;
    }
  </style>
</head>
<body>
  <header>
    <div class="header-content">
      <a href="index.html" class="logo">Videregående Hjelp</a>
      <div class="header-right">
        <nav class="nav-links">
          <a href="guides.html">Guider</a>
          <a href="tools.html">Verktøy</a>
          <a href="news.html" class="active">Nyheter</a>
          <a href="resources.html">Ressurser</a>
        </nav>
        <a href="profile.html" class="profile-pill" aria-label="Min profil"></a>
      </div>
    </div>
  </header>

  <main>
    <div class="page-header">
      <h1 class="page-title">Nyheter</h1>
      <p class="page-desc">Siste oppdateringer, regler og nyheter fra den videregående skolehverdagen.</p>
    </div>

    <div class="news-grid" id="newsGrid">
      <!-- Fylles med JS -->
    </div>
  </main>

  <script>
    if (!localStorage.getItem('theme')) {
        localStorage.setItem('theme', 'dark');
    }
    document.documentElement.setAttribute('data-theme', localStorage.getItem('theme'));

    function formatNewsDate(dateString) {
      const date = new Date(dateString);
      if (Number.isNaN(date.getTime())) return dateString;
      return date.toLocaleDateString('no-NO', { day: '2-digit', month: 'long', year: 'numeric' });
    }

    function renderAllNews(data) {
      const grid = document.getElementById('newsGrid');
      const newsArray = (Array.isArray(data) ? data : (data.news || [])).sort((a, b) => new Date(b.date) - new Date(a.date));

      if (newsArray.length === 0) {
        grid.innerHTML = '<p style="color: var(--text-muted);">Ingen nyheter publisert enda.</p>';
        return;
      }

      grid.innerHTML = newsArray.map(item => `
        <a href="${item.link}" class="news-card">
          <div class="news-thumb-container">
            <img src="${item.thumb}" alt="Bilde for nyhet" class="news-thumb">
          </div>
          <div class="news-content">
            <div class="news-date">${formatNewsDate(item.date)}</div>
            <h2 class="news-title">${item.name}</h2>
            <p class="news-desc">${item.desc}</p>
            <div class="news-read-more">Les saken <span class="material-icons" style="font-size: 16px;">arrow_forward</span></div>
          </div>
        </a>
      `).join('');
    }

    fetch('News/news-data.json')
      .then(response => response.json())
      .then(renderAllNews)
      .catch(error => {
        console.error('Error loading news:', error);
        document.getElementById('newsGrid').innerHTML = '<p>Kunne ikke laste nyheter akkurat nå.</p>';
      });
  </script>
  <script src="Assets/js/profile.js"></script>
</body>
</html>
